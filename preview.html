<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>網頁樣板即時預覽</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-zinc-50 text-zinc-900 dark:bg-zinc-950 dark:text-zinc-100 h-screen flex flex-col overflow-hidden transition-colors duration-200">

    <!-- 頂部控制列 -->
    <header class="h-16 border-b border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-900 flex items-center justify-between px-6 shrink-0 z-10 select-none">
        <div class="flex items-center gap-4">
            <a href="index.html#templates" class="text-zinc-500 hover:text-indigo-600 dark:text-slate-400 dark:hover:text-white flex items-center gap-1 text-sm font-medium transition">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> 返回列表
            </a>
            <div class="h-4 w-[1px] bg-zinc-300 dark:bg-zinc-700"></div>
            <span id="template-title" class="font-semibold text-zinc-800 dark:text-zinc-200">載入中...</span>
        </div>

        <!-- 裝置切換 -->
        <div class="flex items-center bg-zinc-100 dark:bg-zinc-950 p-1 rounded-lg border border-zinc-200 dark:border-zinc-800">
            <button id="btn-desktop" class="p-2 rounded-md hover:text-indigo-600 dark:hover:text-white text-indigo-600 dark:text-indigo-400 bg-white dark:bg-zinc-900 shadow-sm transition" title="電腦版 (100%)">
                <i data-lucide="monitor" class="w-5 h-5"></i>
            </button>
            <button id="btn-tablet" class="p-2 rounded-md text-slate-500 hover:text-indigo-600 dark:hover:text-white transition" title="平板版 (768px)">
                <i data-lucide="tablet" class="w-5 h-5"></i>
            </button>
            <button id="btn-mobile" class="p-2 rounded-md text-slate-500 hover:text-indigo-600 dark:hover:text-white transition" title="手機版 (375px)">
                <i data-lucide="smartphone" class="w-5 h-5"></i>
            </button>
        </div>

        <!-- 諮詢按鈕 -->
        <div>
            <button id="open-inquiry-modal" class="bg-indigo-600 hover:bg-indigo-500 text-white text-sm px-4 py-2 rounded-lg font-semibold flex items-center gap-1.5 transition">
                <i data-lucide="message-square" class="w-4 h-4"></i> 諮詢此樣板
            </button>
        </div>
    </header>

    <!-- Iframe 預覽容器 -->
    <main class="grow bg-zinc-100/50 dark:bg-zinc-900/50 p-6 flex justify-center items-center overflow-auto">
        <div id="preview-wrapper" class="w-full h-full transition-all duration-300 ease-out flex justify-center items-center">
            <iframe id="preview-iframe" src="" class="w-full h-full bg-white rounded-lg shadow-2xl border border-zinc-200 dark:border-zinc-800"></iframe>
        </div>
    </main>

    <!-- ================== 【預覽頁專用：雙軌諮詢 Popup】 ================== -->
    <div id="inquiry-modal" class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-zinc-950/60 backdrop-blur-sm hidden select-none">
        <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-2xl w-full max-w-md overflow-hidden shadow-2xl transition-transform duration-300 scale-95 opacity-0" id="inquiry-modal-content">
            
            <div class="p-5 border-b border-zinc-200 dark:border-zinc-800 flex justify-between items-center bg-zinc-50 dark:bg-zinc-900/50">
                <h3 class="font-bold text-lg text-zinc-900 dark:text-white flex items-center gap-2">
                    <i data-lucide="help-circle" class="text-indigo-500"></i> 請選擇諮詢方式
                </h3>
                <button id="close-inquiry-modal" class="p-1 text-zinc-400 hover:text-zinc-600 dark:hover:white rounded-lg transition">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>

            <!-- 分頁選擇 -->
            <div class="flex border-b border-zinc-200 dark:border-zinc-800">
                <button id="tab-line" class="flex-1 py-3 text-center text-sm font-semibold border-b-2 border-indigo-500 text-indigo-600 dark:text-indigo-400 transition">
                    LINE 快速諮詢
                </button>
                <button id="tab-form" class="flex-1 py-3 text-center text-sm font-semibold border-b-2 border-transparent text-zinc-500 hover:text-zinc-700 dark:hover:text-zinc-300 transition">
                    留資料聯絡我
                </button>
            </div>

            <!-- LINE -->
            <div id="panel-line" class="p-6 text-center block">
                <p class="text-sm text-zinc-600 dark:text-zinc-400 mb-6">
                    點擊下方按鈕將開啟 LINE 官方帳號，並自動為您在對話中帶入此樣板的諮詢。
                </p>
                <a id="line-direct-link" href="#" target="_blank" class="w-full justify-center inline-flex items-center gap-2 bg-emerald-600 hover:bg-emerald-500 text-white font-semibold py-3 px-5 rounded-xl transition">
                    <i data-lucide="message-square"></i> 開啟 LINE 進行諮詢
                </a>
            </div>

            <!-- 表單 (Web3Forms) -->
            <div id="panel-form" class="p-6 hidden">
                <form id="contact-form" class="space-y-4">
                    <input type="hidden" name="access_key" value="YOUR_ACCESS_KEY_HERE">
                    <input type="hidden" name="subject" id="form-email-subject" value="新樣板諮詢項目">
                    <input type="checkbox" name="botcheck" class="hidden" style="display: none;">

                    <div>
                        <label class="block text-xs font-bold text-zinc-500 dark:text-zinc-400 uppercase tracking-wider mb-1.5">您的稱呼</label>
                        <input type="text" name="name" required placeholder="例如：林先生 / Alice" class="w-full bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded-lg px-4 py-2 text-sm text-zinc-900 dark:text-white focus:outline-none focus:border-indigo-500">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-zinc-500 dark:text-zinc-400 uppercase tracking-wider mb-1.5">聯絡方式 (LINE ID / Email)</label>
                        <input type="text" name="contact_info" required placeholder="例如：Line ID: abc12345" class="w-full bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded-lg px-4 py-2 text-sm text-zinc-900 dark:text-white focus:outline-none focus:border-indigo-500">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-zinc-500 dark:text-zinc-400 uppercase tracking-wider mb-1.5">需求簡述 (選填)</label>
                        <textarea name="message" rows="3" placeholder="例如：我想調整網站顏色與加入客製化標誌..." class="w-full bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded-lg px-4 py-2 text-sm text-zinc-900 dark:text-white focus:outline-none focus:border-indigo-500 resize-none"></textarea>
                    </div>

                    <button type="submit" id="form-submit-btn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-3 rounded-xl transition flex justify-center items-center gap-2">
                        送出聯絡資訊
                    </button>
                </form>

                <div id="form-success-state" class="hidden text-center py-6">
                    <div class="mx-auto w-12 h-12 bg-emerald-100 dark:bg-emerald-950/50 border border-emerald-500 text-emerald-500 rounded-full flex items-center justify-center mb-4">
                        <i data-lucide="check" class="w-6 h-6"></i>
                    </div>
                    <h4 class="font-bold text-lg text-zinc-900 dark:text-white">資料提交成功！</h4>
                    <p class="text-sm text-zinc-500 mt-2">諮詢訊息已成功寄送，我將儘快加您的 LINE 與您聯繫！</p>
                </div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // 主題初始化
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        // ================== 【1. 智慧讀取網址參數，載入樣板並設定 iframe（已補回！）】 ==================
        const params = new URLSearchParams(window.location.search);
        const templateId = params.get('id');
        
        // 使用跨層級搜尋函式
        const template = findTemplateById(templateId);

        if (template) {
            document.title = `${template.title} | 樣板即時預覽`;
            document.getElementById('template-title').innerText = template.title;
            document.getElementById('preview-iframe').src = template.demoUrl;
            
            // 動態產生 LINE 快速諮詢連結 (請將 @您的官方帳號ID 替換掉)
            const lineBase = "https://line.me/R/ti/p/@您的官方帳號ID"; 
            const messageText = `您好，我瀏覽了您的作品集網站，對您的「${template.title}」網頁樣板很感興趣，想要進一步諮詢。`;
            document.getElementById('line-direct-link').href = `${lineBase}?text=${encodeURIComponent(messageText)}`;
            
            // 設定 Web3Forms 電子郵件主旨
            document.getElementById('form-email-subject').value = `樣板諮詢：${template.title}`;
        } else {
            document.getElementById('template-title').innerText = "未找到對應樣板";
        }

        // ================== 【2. 預覽頁裝置尺寸切換邏輯】 ==================
        const wrapper = document.getElementById('preview-wrapper');
        const btnDesktop = document.getElementById('btn-desktop');
        const btnTablet = document.getElementById('btn-tablet');
        const btnMobile = document.getElementById('btn-mobile');

        function resetButtons() {
            [btnDesktop, btnTablet, btnMobile].forEach(btn => {
                btn.classList.remove('bg-white', 'dark:bg-slate-900', 'text-indigo-600', 'dark:text-indigo-400', 'shadow-sm');
                btn.classList.add('text-slate-500');
            });
        }

        btnDesktop.addEventListener('click', () => {
            resetButtons();
            btnDesktop.classList.add('bg-white', 'dark:bg-slate-900', 'text-indigo-600', 'dark:text-indigo-400', 'shadow-sm');
            wrapper.style.width = '100%';
            wrapper.style.height = '100%';
            wrapper.className = "w-full h-full transition-all duration-300 ease-out flex justify-center items-center";
        });

        btnTablet.addEventListener('click', () => {
            resetButtons();
            btnTablet.classList.add('bg-white', 'dark:bg-slate-900', 'text-indigo-600', 'dark:text-indigo-400', 'shadow-sm');
            wrapper.style.width = '768px';
            wrapper.style.height = '100%';
            wrapper.className = "max-w-full h-full transition-all duration-300 ease-out border-x-8 border-zinc-200 dark:border-zinc-800 shadow-2xl flex justify-center items-center";
        });

        btnMobile.addEventListener('click', () => {
            resetButtons();
            btnMobile.classList.add('bg-white', 'dark:bg-slate-900', 'text-indigo-600', 'dark:text-indigo-400', 'shadow-sm');
            wrapper.style.width = '375px';
            wrapper.style.height = '100%';
            wrapper.className = "max-w-full h-full transition-all duration-300 ease-out border-x-[12px] border-zinc-200 dark:border-zinc-800 shadow-2xl flex justify-center items-center";
        });

        // ================== 【3. 雙軌諮詢 Popup】 ==================
        const inquiryModal = document.getElementById('inquiry-modal');
        const inquiryContent = document.getElementById('inquiry-modal-content');
        const openInquiryBtn = document.getElementById('open-inquiry-modal');
        const closeInquiryBtn = document.getElementById('close-inquiry-modal');

        const tabLine = document.getElementById('tab-line');
        const tabForm = document.getElementById('tab-form');
        const panelLine = document.getElementById('panel-line');
        const panelForm = document.getElementById('panel-form');

        openInquiryBtn.addEventListener('click', () => {
            inquiryModal.classList.remove('hidden');
            setTimeout(() => {
                inquiryContent.classList.remove('scale-95', 'opacity-0');
            }, 50);
        });

        function closeInquiry() {
            inquiryContent.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                inquiryModal.classList.add('hidden');
            }, 300);
        }
        closeInquiryBtn.addEventListener('click', closeInquiry);

        tabLine.addEventListener('click', () => {
            tabLine.className = "flex-1 py-3 text-center text-sm font-semibold border-b-2 border-indigo-500 text-indigo-600 dark:text-indigo-400 transition";
            tabForm.className = "flex-1 py-3 text-center text-sm font-semibold border-b-2 border-transparent text-zinc-500 hover:text-zinc-700 dark:hover:text-zinc-300 transition";
            panelLine.classList.remove('hidden');
            panelForm.classList.add('hidden');
        });

        tabForm.addEventListener('click', () => {
            tabForm.className = "flex-1 py-3 text-center text-sm font-semibold border-b-2 border-indigo-500 text-indigo-600 dark:text-indigo-400 transition";
            tabLine.className = "flex-1 py-3 text-center text-sm font-semibold border-b-2 border-transparent text-zinc-500 hover:text-zinc-700 dark:hover:text-zinc-300 transition";
            panelForm.classList.remove('hidden');
            panelLine.classList.add('hidden');
        });

        // ================== 【4. AJAX 發送郵件邏輯 (Web3Forms)】 ==================
        const contactForm = document.getElementById('contact-form');
        const successState = document.getElementById('form-success-state');
        const submitBtn = document.getElementById('form-submit-btn');

        contactForm.addEventListener('submit', function(e) {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.innerText = "正在傳送資訊...";

            const formData = new FormData(contactForm);
            const object = Object.fromEntries(formData);
            const json = JSON.stringify(object);

            fetch('https://api.web3forms.com/submit', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: json
            })
            .then(async (response) => {
                let jsonRes = await response.json();
                if (response.status == 200) {
                    contactForm.classList.add('hidden');
                    successState.classList.remove('hidden');
                } else {
                    alert("提交失敗：" + jsonRes.message);
                    submitBtn.disabled = false;
                    submitBtn.innerText = "重試送出";
                }
            })
            .catch(error => {
                console.log(error);
                alert("網路連接異常，請稍後再試。");
                submitBtn.disabled = false;
                submitBtn.innerText = "重試送出";
            });
        });

        lucide.createIcons();
    </script>
</body>
</html>
