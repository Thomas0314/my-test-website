<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鋼琴教學官網 | 鋼琴老師個人品牌樣板</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-50 text-stone-800 font-serif">
    <!-- 頂部導覽 -->
    <header class="p-6 flex justify-between items-center max-w-4xl mx-auto border-b border-stone-200">
        <span class="text-xl font-bold tracking-widest text-stone-900">CLARA PIANO</span>
        <span class="text-xs tracking-wider text-stone-500 uppercase">Est. 2026</span>
    </header>

    <!-- Hero 視覺 -->
    <section class="max-w-3xl mx-auto px-6 py-16 text-center">
        <div class="w-24 h-24 bg-stone-200 rounded-full mx-auto mb-6 flex items-center justify-center border border-stone-300">
            🎹
        </div>
        <h1 class="text-3xl md:text-4xl font-semibold text-stone-900 leading-snug">指尖上的優雅與靈魂</h1>
        <p class="mt-4 text-stone-600 max-w-lg mx-auto text-sm leading-relaxed">
            提供古典鋼琴個別課、成人興趣班與檢定考試專業輔導。讓我們在黑白琴鍵之間，探索音樂的無限可能。
        </p>
        <button class="mt-8 bg-stone-900 hover:bg-stone-800 text-white text-xs px-6 py-3 tracking-wider rounded transition">
            預約體驗課
        </button>
    </section>

    <!-- 特色介紹 -->
    <section class="max-w-4xl mx-auto px-6 py-12 grid grid-cols-1 md:grid-cols-3 gap-8">
        <div class="border border-stone-200 p-6 bg-white rounded">
            <h3 class="font-bold text-stone-900 text-base">專業資歷師資</h3>
            <p class="mt-2 text-stone-600 text-xs leading-relaxed">國立大學音樂系碩士畢業，具備多年一線教學與演出經驗。</p>
        </div>
        <div class="border border-stone-200 p-6 bg-white rounded">
            <h3 class="font-bold text-stone-900 text-base">個別適性教學</h3>
            <p class="mt-2 text-stone-600 text-xs leading-relaxed">根據每位學生的興趣與進度，客製化編排樂曲與樂理訓練。</p>
        </div>
        <div class="border border-stone-200 p-6 bg-white rounded">
            <h3 class="font-bold text-stone-900 text-base">成果演奏機會</h3>
            <p class="mt-2 text-stone-600 text-xs leading-relaxed">每年定期舉辦學生音樂分享會，建立舞台自信心與表現力。</p>
        </div>
    </section>

    <!-- 頁尾 -->
    <footer class="bg-stone-900 text-stone-400 py-10 text-center text-xs">
        <p>&copy; Clara Piano Studio. All rights reserved.</p>
    </footer>
</body>
</html>
